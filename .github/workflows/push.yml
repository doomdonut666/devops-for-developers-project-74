name: CI/CD

on:
  push:

jobs:
  test-and-publish:
    # Используем убунту
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Запуск тестов, используется docker compose
      - name: Run tests via Make CI
        run: make ci

      # 3. Авторизация в докер хаб
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Сборка продакшн образа с последующим пушем
      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.production
          push: true
          # Тег формируется динамически: ваш_логин/js-fastify-blog:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-for-developers-project-74